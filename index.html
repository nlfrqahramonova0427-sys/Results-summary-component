<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <title>Results summary component</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>
<body>

<main class="card">

  <section class="result-block">
  <h3>Your Result</h3>

  <div class="score-circle"> 
    <span class="big-score">76</span>
    <p>of 100</p> 
  </div>
  
    <h2>Great</h2>
    <p>You scored higher than 65% of the people who have taken these tests.</p>
  </section>
  
<section class="summary-block">
    <h3>Summary</h3>

    <div class="summary-items">

     <div class="item red">
    <div class="item-title">
        <img src="./images/icon-reaction.svg" alt="Reaction icon">
        <span>Reaction</span>
    </div>
    <p class="item-score">80 / 100</p>
</div>

<div class="item yellow">
    <div class="item-title">
        <img src="./images/icon-memory.svg" alt="memory icon">
        <span>Memory</span>
    </div>
    <p class="item-score">92 / 100</p>
</div>

<div class="item green">
    <div class="item-title">
        <img src="./images/icon-verbal.svg" alt="verbal icon">
        <span>Verbal</span>
    </div>
    <p class="item-score"> 61 / 100</p>
</div>

<div class="item blue">
    <div class="item-title">
        <img src="./images/icon-visual.svg" alt="visual icon">
        <span>Visual</span>
    </div>
    <p class="item-score">73 / 100</p>
</div>
      
    
 
    <button>Continue</button>
 

</section>
</main>

</body>
</html>
